version: '3.8'
services:
  nginx:
    image: nginx:alpine
    container_name: gateway-nginx-dev
    ports:
      - "80:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend-app
      - backend-app
    networks:
      - app-network

  frontend-app:
    image: <USER_DOCKERHUB>/qlncc-fe:latest
    container_name: my-nuxt-app-dev
    networks:
      - app-network

  backend-app:
    image: <USER_DOCKERHUB>/qlncc-be:latest
    container_name: my-spring-app-dev
    depends_on:
      - postgres
      - redis
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/mydb
      SPRING_DATASOURCE_USERNAME: myuser
      SPRING_DATASOURCE_PASSWORD: mypassword
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    networks:
      - app-network

  postgres:
    image: postgres:15-alpine
    container_name: my-postgres-dev
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydb
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: my-redis-dev
    networks:
      - app-network

volumes:
  postgres-data:

networks:
  app-network:
    driver: bridge
